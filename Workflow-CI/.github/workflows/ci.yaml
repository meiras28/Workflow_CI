name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run MLflow Project
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
        MLFLOW_TRACKING_USERNAME: "meiras28"
        MLFLOW_TRACKING_PASSWORD: "793493e8b73d613aae82ee4fdc952248480949cf793493e8b73d613aae82ee4fdc952248480949cf"
      run: |
        mlflow run . --entry-point main
